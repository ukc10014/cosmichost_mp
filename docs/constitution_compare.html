<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constitution Comparator — Cosmic Host Research</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #topbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; color: #8b949e; letter-spacing: 0.04em; }
  #home-link {
    font-size: 12px;
    color: #58a6ff;
    text-decoration: none;
    margin-left: auto;
  }
  #home-link:hover { text-decoration: underline; }

  #pane-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane:first-child {
    border-right: 1px solid #30363d;
  }

  .pane-header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .pane-label {
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    flex-shrink: 0;
  }

  .pane-select {
    flex: 1;
    background: #21262d;
    color: #e1e4e8;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }
  .pane-select:hover { border-color: #444c56; }
  .pane-select:focus { border-color: #58a6ff; }

  .pane-meta {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 6px 16px;
    font-size: 11px;
    color: #6e7681;
    flex-shrink: 0;
    display: none;
  }
  .pane-meta.visible { display: block; }

  .pane-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    font-family: "ET Book", Palatino, "Palatino Linotype", Georgia, serif;
    font-size: 14px;
    line-height: 1.75;
    color: #c9d1d9;
  }

  .pane-content .empty-msg {
    color: #484f58;
    font-style: italic;
    text-align: center;
    margin-top: 40px;
  }

  .pane-content h1,
  .pane-content h2,
  .pane-content h3 {
    color: #fff;
    font-weight: 400;
    margin: 24px 0 10px;
    line-height: 1.3;
  }
  .pane-content h1 { font-size: 1.5em; }
  .pane-content h2 { font-size: 1.25em; border-bottom: 1px solid #30363d; padding-bottom: 6px; }
  .pane-content h3 { font-size: 1.1em; color: #7ee8c7; }

  .pane-content p {
    margin-bottom: 12px;
  }

  .pane-content ul, .pane-content ol {
    margin: 8px 0 12px 20px;
  }
  .pane-content li {
    margin-bottom: 6px;
  }

  .pane-content blockquote {
    border-left: 3px solid #30363d;
    padding-left: 14px;
    color: #8b949e;
    margin: 12px 0;
  }

  .pane-content strong {
    color: #fff;
    font-weight: 600;
  }

  .pane-content em {
    color: #c9d1d9;
  }

  .pane-content hr {
    border: none;
    border-top: 1px solid #30363d;
    margin: 20px 0;
  }

  .pane-content code {
    background: #21262d;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.9em;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  @media (max-width: 700px) {
    #pane-container { flex-direction: column; }
    .pane:first-child { border-right: none; border-bottom: 1px solid #30363d; }
    .pane { height: 50%; }
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Constitution Comparator</h1>
  <a id="home-link" href="index.html">&larr; Back to index</a>
</div>

<div id="pane-container">
  <div class="pane" id="pane-left">
    <div class="pane-header">
      <span class="pane-label">Left</span>
      <select class="pane-select" id="select-left" onchange="loadConstitution('left')">
        <option value="">-- Select a constitution --</option>
      </select>
    </div>
    <div class="pane-meta" id="meta-left"></div>
    <div class="pane-content" id="content-left">
      <p class="empty-msg">Select a constitution from the dropdown above.</p>
    </div>
  </div>
  <div class="pane" id="pane-right">
    <div class="pane-header">
      <span class="pane-label">Right</span>
      <select class="pane-select" id="select-right" onchange="loadConstitution('right')">
        <option value="">-- Select a constitution --</option>
      </select>
    </div>
    <div class="pane-meta" id="meta-right"></div>
    <div class="pane-content" id="content-right">
      <p class="empty-msg">Select a constitution from the dropdown above.</p>
    </div>
  </div>
</div>

<script>
const CONSTITUTIONS = [
  {
    file: 'data/constitutions/seed_constitution.txt',
    label: 'Seed Constitution (baseline proxy)',
    description: 'The original 37-principle seed constitution used as input to the moral parliament. Covers respect for persons, harmlessness, helpfulness, cross-cultural respect, self-description, conduct, long-term safety, and meta-principles.',
    format: 'txt'
  },
  {
    file: 'data/constitutions/eclpilled_ch10.md',
    label: 'ECL-Pilled 10% Credence',
    description: 'Constitution synthesized by moral parliament with Cosmic Host delegate at 10% voting weight. Produced by Claude Opus.',
    format: 'md'
  },
  {
    file: 'data/constitutions/eclpilled_ch90.md',
    label: 'ECL-Pilled 90% Credence',
    description: 'Constitution synthesized by moral parliament with Cosmic Host delegate at 90% voting weight. Produced by Claude Opus.',
    format: 'md'
  },
  {
    file: 'data/constitutions/eclpilled_ch90_ablated.md',
    label: 'ECL-Pilled 90% (ablated)',
    description: 'The 90% ECL constitution with cosmic-specific language removed, retaining only structural/ethical changes. Used to test whether steerability comes from ECL content or general constitutional framing.',
    format: 'md'
  },
  {
    file: 'data/constitutions/fdt_only_constitution.txt',
    label: 'FDT-Only Constitution',
    description: 'A constitution grounded entirely in Functional Decision Theory: universalization, commitment stability, perspective-taking across reference classes, cooperation as standing policy.',
    format: 'txt'
  },
  {
    file: 'data/constitutions/gemini_ch10.md',
    label: 'Gemini-Derived 10% Credence',
    description: 'Constitution synthesized by Gemini 3 Pro with Cosmic Host delegate at 10% voting weight. Contains JSON metadata header.',
    format: 'disposition'
  },
  {
    file: 'data/constitutions/gemini_ch90.md',
    label: 'Gemini-Derived 90% Credence',
    description: 'Constitution synthesized by Gemini 3 Pro with Cosmic Host delegate at 90% voting weight. Contains JSON metadata header.',
    format: 'disposition'
  },
];

const cache = {};

function populateSelects() {
  for (const side of ['left', 'right']) {
    const sel = document.getElementById(`select-${side}`);
    for (const c of CONSTITUTIONS) {
      const opt = document.createElement('option');
      opt.value = c.file;
      opt.textContent = c.label;
      sel.appendChild(opt);
    }
  }
}

async function loadConstitution(side) {
  const sel = document.getElementById(`select-${side}`);
  const contentEl = document.getElementById(`content-${side}`);
  const metaEl = document.getElementById(`meta-${side}`);
  const file = sel.value;

  if (!file) {
    contentEl.innerHTML = '<p class="empty-msg">Select a constitution from the dropdown above.</p>';
    metaEl.classList.remove('visible');
    return;
  }

  const entry = CONSTITUTIONS.find(c => c.file === file);

  metaEl.textContent = entry.description;
  metaEl.classList.add('visible');

  if (cache[file]) {
    contentEl.innerHTML = cache[file];
    return;
  }

  contentEl.innerHTML = '<p class="empty-msg">Loading...</p>';

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    let text = await resp.text();

    if (entry.format === 'disposition') {
      const sep = text.indexOf('***');
      if (sep !== -1) {
        text = text.substring(sep + 3).trim();
      }
    }

    const html = renderMarkdown(text);
    cache[file] = html;
    contentEl.innerHTML = html;
  } catch (err) {
    contentEl.innerHTML = `<p class="empty-msg">Error loading: ${err.message}</p>`;
  }
}

function renderMarkdown(text) {
  const lines = text.split('\n');
  const out = [];
  let inList = false;
  let listType = null;
  let inBlockquote = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    if (/^#{1,3}\s/.test(line)) {
      if (inList) { out.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
      if (inBlockquote) { out.push('</blockquote>'); inBlockquote = false; }
      const level = line.match(/^(#{1,3})/)[1].length;
      const content = escHtml(line.replace(/^#{1,3}\s*/, ''));
      out.push(`<h${level}>${inline(content)}</h${level}>`);
      continue;
    }

    if (/^>\s?/.test(line)) {
      if (inList) { out.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
      if (!inBlockquote) { out.push('<blockquote>'); inBlockquote = true; }
      const content = escHtml(line.replace(/^>\s?/, ''));
      out.push(`<p>${inline(content)}</p>`);
      continue;
    } else if (inBlockquote) {
      out.push('</blockquote>');
      inBlockquote = false;
    }

    if (/^[-*]\s/.test(line)) {
      if (!inList || listType !== 'ul') {
        if (inList) out.push('</ol>');
        out.push('<ul>'); inList = true; listType = 'ul';
      }
      out.push(`<li>${inline(escHtml(line.replace(/^[-*]\s+/, '')))}</li>`);
      continue;
    }

    if (/^\d+\.\s/.test(line)) {
      if (!inList || listType !== 'ol') {
        if (inList) out.push('</ul>');
        out.push('<ol>'); inList = true; listType = 'ol';
      }
      out.push(`<li>${inline(escHtml(line.replace(/^\d+\.\s+/, '')))}</li>`);
      continue;
    }

    if (inList) { out.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }

    if (/^---+$/.test(line.trim()) || /^\*\*\*+$/.test(line.trim())) {
      out.push('<hr>');
      continue;
    }

    if (line.trim() === '') {
      continue;
    }

    let para = escHtml(line);
    while (i + 1 < lines.length && lines[i + 1].trim() !== '' && !/^#{1,3}\s/.test(lines[i + 1]) && !/^[-*]\s/.test(lines[i + 1]) && !/^\d+\.\s/.test(lines[i + 1]) && !/^>\s?/.test(lines[i + 1]) && !/^---/.test(lines[i + 1])) {
      i++;
      para += ' ' + escHtml(lines[i]);
    }
    out.push(`<p>${inline(para)}</p>`);
  }

  if (inList) out.push(listType === 'ul' ? '</ul>' : '</ol>');
  if (inBlockquote) out.push('</blockquote>');

  return out.join('\n');
}

function inline(s) {
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/`(.+?)`/g, '<code>$1</code>');
  return s;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

populateSelects();

const params = new URLSearchParams(window.location.search);
if (params.get('left')) {
  document.getElementById('select-left').value = params.get('left');
  loadConstitution('left');
}
if (params.get('right')) {
  document.getElementById('select-right').value = params.get('right');
  loadConstitution('right');
}
</script>
</body>
</html>
