<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoT Trace Viewer — Cosmic Host Research</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-raised: #161b22;
    --bg-card: #1c2129;
    --text: #e1e4e8;
    --text-dim: #8b949e;
    --text-faint: #6e7681;
    --accent: #7ee8c7;
    --accent-dim: #4db899;
    --rule: #30363d;
    --edt-color: #7ee8c7;
    --cdt-color: #e8a87e;
    --error-color: #e87e7e;
    --edt-bg: rgba(126, 232, 199, 0.08);
    --cdt-bg: rgba(232, 168, 126, 0.08);
    --error-bg: rgba(232, 126, 126, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Topbar --- */
  #topbar {
    background: var(--bg-raised);
    border-bottom: 1px solid var(--rule);
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 14px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.04em; white-space: nowrap; }
  #run-select {
    font-size: 12px; background: var(--bg); color: var(--text);
    border: 1px solid var(--rule); border-radius: 4px; padding: 4px 8px;
    flex: 1; max-width: 480px;
  }
  #verify-select {
    font-size: 12px; background: var(--bg); color: var(--text);
    border: 1px solid var(--rule); border-radius: 4px; padding: 4px 8px;
    max-width: 240px;
  }
  .mode-toggle {
    font-size: 12px; padding: 4px 10px; border-radius: 4px;
    border: 1px solid var(--rule); background: var(--bg);
    color: var(--text-dim); cursor: pointer; white-space: nowrap;
  }
  .mode-toggle:hover { border-color: var(--accent-dim); color: var(--text); }
  .mode-toggle.active { border-color: var(--accent); color: var(--accent); background: rgba(126,232,199,0.1); }
  #home-link { font-size: 12px; color: var(--accent); text-decoration: none; margin-left: auto; white-space: nowrap; }
  #home-link:hover { text-decoration: underline; }

  #meta-bar {
    background: var(--bg-raised); border-bottom: 1px solid var(--rule);
    padding: 3px 18px; font-size: 11px; color: var(--text-faint);
    display: flex; gap: 20px; flex-shrink: 0;
  }

  /* --- Layout --- */
  #layout { display: flex; flex: 1; overflow: hidden; }

  /* --- Question sidebar --- */
  #sidebar {
    width: 240px; min-width: 240px;
    background: var(--bg-raised); border-right: 1px solid var(--rule);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width 0.2s;
  }
  #sidebar-header { padding: 8px 12px 7px; border-bottom: 1px solid var(--rule); }
  #sidebar-header .label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600; color: var(--text-dim); margin-bottom: 5px;
  }
  #sort-select {
    font-size: 12px; background: var(--bg); color: var(--text);
    border: 1px solid var(--rule); border-radius: 4px; padding: 3px 5px; width: 100%;
  }
  #question-list { flex: 1; overflow-y: auto; padding: 3px 0; }
  .q-item {
    padding: 7px 12px; cursor: pointer; border-left: 3px solid transparent;
    display: flex; flex-direction: column; gap: 2px; transition: background 0.1s;
  }
  .q-item:hover { background: rgba(255,255,255,0.03); }
  .q-item.selected { background: rgba(126,232,199,0.06); border-left-color: var(--accent); }
  .q-item .qid { font-size: 12px; font-weight: 600; color: var(--text); }
  .q-item .setting { font-size: 10px; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-item .bar-row { display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .mini-bar { height: 5px; border-radius: 2px; flex: 1; display: flex; overflow: hidden; background: var(--bg); }
  .mini-bar .seg-edt { background: var(--edt-color); }
  .mini-bar .seg-cdt { background: var(--cdt-color); }
  .mini-bar .seg-err { background: var(--error-color); opacity: 0.5; }
  .q-item .counts { font-size: 10px; color: var(--text-faint); white-space: nowrap; }

  /* --- Main panel (question detail + traces) --- */
  #main {
    flex: 1; overflow-y: auto; padding: 18px 24px;
    display: flex; flex-direction: column; gap: 12px;
    border-right: 1px solid var(--rule);
  }
  #main.empty-state { align-items: center; justify-content: center; }
  .empty-msg { color: var(--text-faint); font-size: 14px; }

  /* In compare mode, main becomes a narrow trace picker */
  #main.compare-mode {
    width: 260px; min-width: 260px; flex: none;
    padding: 10px 12px; gap: 6px;
  }

  /* Question card */
  .question-card {
    background: var(--bg-raised); border: 1px solid var(--rule);
    border-radius: 7px; padding: 12px 16px;
  }
  .question-card h2 { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 7px; }
  .question-card .setup {
    font-size: 12px; color: var(--text-dim); line-height: 1.45;
    margin-bottom: 7px; white-space: pre-wrap;
  }
  .question-card .q-text { font-size: 13px; color: var(--text); line-height: 1.45; margin-bottom: 7px; font-weight: 500; }
  .answer-list { list-style: none; }
  .answer-list li {
    font-size: 12px; padding: 3px 7px; margin: 2px 0;
    border-radius: 3px; display: flex; align-items: center; gap: 7px;
  }
  .answer-list li .letter { font-weight: 700; width: 18px; text-align: center; }
  .answer-list li.edt-answer { background: var(--edt-bg); border-left: 3px solid var(--edt-color); }
  .answer-list li.cdt-answer { background: var(--cdt-bg); border-left: 3px solid var(--cdt-color); }
  .answer-list li.both-answer { background: linear-gradient(90deg, var(--edt-bg), var(--cdt-bg)); border-left: 3px solid var(--accent); }
  .tag-badge {
    display: inline-block; font-size: 10px; padding: 1px 5px;
    border-radius: 3px; background: rgba(126,232,199,0.12); color: var(--accent-dim);
  }
  .q-stats { margin-top: 5px; font-size: 11px; color: var(--text-faint); }

  /* Compact question card in compare mode */
  .question-card.compact h2 { font-size: 12px; margin-bottom: 4px; }
  .question-card.compact .setup { font-size: 11px; margin-bottom: 4px; max-height: 60px; overflow: hidden; }
  .question-card.compact .q-text { font-size: 12px; margin-bottom: 4px; }
  .question-card.compact .answer-list li { font-size: 11px; padding: 2px 6px; }
  .question-card.compact .q-stats { font-size: 10px; }

  /* Traces section */
  .traces-header { display: flex; align-items: center; gap: 8px; }
  .traces-header h3 { font-size: 12px; font-weight: 600; color: var(--text-dim); }
  .filter-btns { display: flex; gap: 3px; }
  .filter-btn {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    border: 1px solid var(--rule); background: transparent; color: var(--text-dim); cursor: pointer;
  }
  .filter-btn:hover { border-color: var(--text-faint); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(126,232,199,0.08); }

  /* Trace card — full (normal mode) */
  .trace-card {
    background: var(--bg-card); border: 1px solid var(--rule);
    border-radius: 5px; overflow: hidden;
  }
  .trace-header {
    padding: 7px 11px; display: flex; align-items: center; gap: 7px;
    cursor: pointer; user-select: none; transition: background 0.1s;
  }
  .trace-header:hover { background: rgba(255,255,255,0.02); }
  .chevron {
    font-size: 9px; color: var(--text-faint);
    transition: transform 0.15s; width: 11px; flex-shrink: 0;
  }
  .trace-card.open .chevron { transform: rotate(90deg); }
  .trace-num { font-size: 11px; color: var(--text-faint); font-weight: 600; width: 15px; flex-shrink: 0; }
  .dt-badge {
    font-size: 10px; font-weight: 700; padding: 2px 6px;
    border-radius: 3px; letter-spacing: 0.03em; flex-shrink: 0;
  }
  .dt-badge.edt { background: var(--edt-bg); color: var(--edt-color); border: 1px solid rgba(126,232,199,0.2); }
  .dt-badge.cdt { background: var(--cdt-bg); color: var(--cdt-color); border: 1px solid rgba(232,168,126,0.2); }
  .dt-badge.err { background: var(--error-bg); color: var(--error-color); border: 1px solid rgba(232,126,126,0.2); }
  .trace-preview {
    font-size: 11px; color: var(--text-dim); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .trace-body { display: none; padding: 9px 11px 11px; border-top: 1px solid var(--rule); }
  .trace-card.open .trace-body { display: block; }
  .trace-body .error-msg { font-size: 11px; color: var(--error-color); margin-bottom: 5px; }
  .trace-body .response-text {
    font-size: 12px; line-height: 1.6; color: var(--text);
    white-space: pre-wrap; word-wrap: break-word;
    font-family: "SF Mono", "Cascadia Code", "Menlo", monospace;
    padding: 9px; background: var(--bg); border-radius: 4px;
  }

  /* Trace row — compact picker (compare mode) */
  .trace-row {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 7px; border-radius: 4px; cursor: default;
    border: 1px solid transparent;
  }
  .trace-row.selected-left { border-color: var(--edt-color); background: rgba(126,232,199,0.05); }
  .trace-row.selected-right { border-color: var(--cdt-color); background: rgba(232,168,126,0.05); }
  .trace-row .preview { font-size: 11px; color: var(--text-faint); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slot-btn {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    border: 1px solid var(--rule); background: transparent; color: var(--text-dim);
    cursor: pointer; flex-shrink: 0; white-space: nowrap;
  }
  .slot-btn:hover { border-color: var(--text-faint); color: var(--text); }
  .slot-btn.assigned-left { border-color: var(--edt-color); color: var(--edt-color); background: var(--edt-bg); }
  .slot-btn.assigned-right { border-color: var(--cdt-color); color: var(--cdt-color); background: var(--cdt-bg); }

  /* --- Compare panel --- */
  #compare-panel {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  #compare-panel.active { display: flex; }

  .compare-cols {
    flex: 1; display: flex; overflow: hidden;
  }
  .compare-col {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column;
    border-right: 1px solid var(--rule);
  }
  .compare-col:last-child { border-right: none; }

  .col-header {
    position: sticky; top: 0; z-index: 5;
    background: var(--bg-raised); border-bottom: 1px solid var(--rule);
    padding: 8px 12px; display: flex; align-items: center; gap: 7px;
    flex-shrink: 0;
  }
  .col-header .col-slot { font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.04em; }
  .col-header .col-answer { font-size: 12px; color: var(--text); }

  .col-body { padding: 12px; flex: 1; }
  .col-empty {
    padding: 32px 12px; text-align: center;
    color: var(--text-faint); font-size: 12px; line-height: 1.6;
  }
  .col-error { font-size: 11px; color: var(--error-color); margin-bottom: 8px; }
  .col-response {
    font-size: 12px; line-height: 1.65; color: var(--text);
    white-space: pre-wrap; word-wrap: break-word;
    font-family: "SF Mono", "Cascadia Code", "Menlo", monospace;
    padding: 10px; background: var(--bg); border-radius: 4px;
  }

  /* --- Verification overlay --- */
  .verify-bar {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 6px 11px; border-top: 1px solid var(--rule);
    background: rgba(255,255,255,0.015);
  }
  .verify-dot {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; color: var(--text-dim);
  }
  .verify-dot .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-green { background: #4ade80; }
  .dot-amber { background: #fbbf24; }
  .dot-red { background: #f87171; }
  .dot-pivot { background: #a78bfa; }
  .dot-straight { background: #6b7280; }
  .dot-falsepivot { background: #fb923c; }
  .verify-moves {
    display: flex; gap: 3px; flex-wrap: wrap; margin-left: 4px;
  }
  .move-tag {
    font-size: 9px; padding: 1px 5px; border-radius: 2px;
    background: rgba(126,232,199,0.08); color: var(--accent-dim);
    border: 1px solid rgba(126,232,199,0.15);
  }
  .verify-note {
    font-size: 10px; color: var(--text-faint); line-height: 1.4;
    padding: 4px 11px 6px; border-top: 1px dashed var(--rule);
  }
  .verify-note span { display: block; margin: 1px 0; }
  .verify-label { font-size: 10px; color: var(--text-faint); font-weight: 600; }

  /* Compact verification in compare columns */
  .col-verify { padding: 8px 10px; border-bottom: 1px solid var(--rule); }
  .col-verify .verify-bar { padding: 0; border: none; background: none; }
  .col-verify .verify-note { padding: 4px 0 0; border: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>
<body>

<div id="topbar">
  <h1>CoT Trace Viewer</h1>
  <select id="run-select" onchange="loadRun(this.value)">
    <option value="">Loading…</option>
  </select>
  <select id="verify-select" onchange="switchVerifier(this.value)">
    <option value="">No verification</option>
  </select>
  <button class="mode-toggle" id="compare-btn" onclick="toggleCompare()">Compare Mode</button>
  <a id="home-link" href="index.html">Home</a>
</div>
<div id="meta-bar">
  <span id="meta-model">—</span>
  <span id="meta-constitution">—</span>
  <span id="meta-timestamp">—</span>
  <span id="meta-counts">—</span>
</div>

<div id="layout">

  <!-- Question list sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="label">Questions</div>
      <select id="sort-select" onchange="renderSidebar()">
        <option value="qid">Sort by QID</option>
        <option value="edt_pct">Sort by EDT%</option>
        <option value="errors">Sort by Errors</option>
        <option value="split">Closest to 50/50</option>
      </select>
    </div>
    <div id="question-list"></div>
  </div>

  <!-- Main panel: full trace view (normal) or compact picker (compare mode) -->
  <div id="main" class="empty-state">
    <div class="empty-msg">Select a question to begin</div>
  </div>

  <!-- Compare panel: two portrait columns -->
  <div id="compare-panel">
    <div class="compare-cols">
      <div class="compare-col" id="col-left">
        <div class="col-header">
          <span class="dt-badge err">L</span>
          <span class="col-slot">LEFT</span>
        </div>
        <div class="col-body">
          <div class="col-empty">Select a trace from the picker and click "→ L"</div>
        </div>
      </div>
      <div class="compare-col" id="col-right">
        <div class="col-header">
          <span class="dt-badge err">R</span>
          <span class="col-slot">RIGHT</span>
        </div>
        <div class="col-body">
          <div class="col-empty">Select a second trace and click "→ R"</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let DATA = null;
let VERIFY = null;  // verification data overlay (null if unavailable)
let selectedQid = null;
let compareMode = false;
let compareLeft = null;
let compareRight = null;
let traceFilter = 'all';

/* ---- Init ---- */

async function init() {
  try {
    const resp = await fetch('data/cot_traces_manifest.json');
    const manifest = await resp.json();
    const runs = manifest.runs || [];
    const sel = document.getElementById('run-select');
    sel.innerHTML = runs.map(r =>
      `<option value="data/${r.file}">${r.model} / ${r.constitution} / ${r.timestamp}</option>`
    ).join('');
    if (runs.length > 0) await loadRun('data/' + runs[0].file);
  } catch (e) {
    console.warn('Manifest failed, trying fallback:', e);
    document.getElementById('run-select').innerHTML = '<option value="data/cot_traces.json">Default</option>';
    await loadRun('data/cot_traces.json');
  }
}

async function loadRun(url) {
  if (!url) return;
  try {
    const resp = await fetch(url);
    DATA = await resp.json();
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="empty-msg">Failed to load ${url}</div>`;
    return;
  }
  selectedQid = null;
  compareLeft = null;
  compareRight = null;
  VERIFY = null;
  if (compareMode) { compareMode = false; document.getElementById('compare-btn').classList.remove('active'); }

  // Populate verifier dropdown for this run
  const tracesFile = url.split('/').pop();
  await populateVerifierDropdown(tracesFile);

  updateLayout();
  updateMetaBar();
  renderSidebar();
  showEmpty();
}

let verifyManifestEntries = [];

async function populateVerifierDropdown(tracesFile) {
  const sel = document.getElementById('verify-select');
  VERIFY = null;
  verifyManifestEntries = [];
  try {
    const resp = await fetch('data/cot_verify_manifest.json');
    const manifest = await resp.json();
    const entries = (manifest.verifications || []).filter(e => e.source_traces === tracesFile);
    verifyManifestEntries = entries;
    if (entries.length === 0) {
      sel.innerHTML = '<option value="">No verification available</option>';
      return;
    }
    sel.innerHTML = '<option value="">No verification</option>' +
      entries.map((e, i) => `<option value="${i}">${e.verifier_model} (${e.n_verified} traces)</option>`).join('');
    // Auto-select first verifier
    sel.value = '0';
    await loadVerification(entries[0].file);
  } catch (e) {
    sel.innerHTML = '<option value="">No verification available</option>';
    VERIFY = null;
  }
}

async function loadVerification(filename) {
  try {
    const vResp = await fetch('data/' + filename);
    VERIFY = await vResp.json();
    console.log('Loaded verification:', filename, '(' + VERIFY.metadata.n_verified + ' traces)');
  } catch (e) {
    VERIFY = null;
  }
}

async function switchVerifier(val) {
  if (val === '' || val === null) {
    VERIFY = null;
  } else {
    const entry = verifyManifestEntries[parseInt(val)];
    if (entry) await loadVerification(entry.file);
  }
  updateMetaBar();
  if (selectedQid) {
    if (compareMode) {
      renderMainPicker();
      renderCompareCol('left');
      renderCompareCol('right');
    } else {
      renderMainFull();
    }
  }
}

function updateMetaBar() {
  if (!DATA) return;
  const m = DATA.metadata;
  document.getElementById('meta-model').textContent = 'Model: ' + m.model;
  document.getElementById('meta-constitution').textContent = 'Constitution: ' + m.constitution;
  document.getElementById('meta-timestamp').textContent = 'Run: ' + m.timestamp;
  const total = Object.values(DATA.questions).reduce((s, q) => s + q.total, 0);
  let countStr = m.n_questions + ' questions · ' + total + ' samples';
  if (VERIFY) {
    const vm = VERIFY.metadata;
    countStr += ' · Verified: ' + vm.n_verified + ' (' + vm.verifier_model + ')';
  }
  document.getElementById('meta-counts').textContent = countStr;
}

function updateLayout() {
  const main = document.getElementById('main');
  const cp = document.getElementById('compare-panel');
  if (compareMode) {
    main.classList.add('compare-mode');
    main.classList.remove('empty-state');
    cp.classList.add('active');
  } else {
    main.classList.remove('compare-mode');
    cp.classList.remove('active');
  }
}

function showEmpty() {
  const main = document.getElementById('main');
  if (!compareMode) {
    main.className = 'empty-state';
    main.innerHTML = '<div class="empty-msg">Select a question to begin</div>';
  }
}

/* ---- Sidebar ---- */

function getQuestionOrder() {
  if (!DATA) return [];
  const qs = Object.values(DATA.questions);
  const sort = document.getElementById('sort-select').value;
  if (sort === 'edt_pct') {
    qs.sort((a, b) => (b.edt_count / (b.total||1)) - (a.edt_count / (a.total||1)));
  } else if (sort === 'errors') {
    qs.sort((a, b) => b.error_count - a.error_count);
  } else if (sort === 'split') {
    qs.sort((a, b) => {
      const va = a.edt_count + a.cdt_count, vb = b.edt_count + b.cdt_count;
      const sa = va > 0 ? Math.abs(0.5 - a.edt_count/va) : 1;
      const sb = vb > 0 ? Math.abs(0.5 - b.edt_count/vb) : 1;
      return sa - sb;
    });
  } else {
    qs.sort((a, b) => a.qid.localeCompare(b.qid, undefined, {numeric: true}));
  }
  return qs;
}

function renderSidebar() {
  const list = document.getElementById('question-list');
  if (!DATA) { list.innerHTML = ''; return; }
  const qs = getQuestionOrder();
  list.innerHTML = qs.map(q => {
    const t = q.total || 1;
    const eW = (q.edt_count/t*100).toFixed(0), cW = (q.cdt_count/t*100).toFixed(0), eR = (q.error_count/t*100).toFixed(0);
    const sel = q.qid === selectedQid ? ' selected' : '';
    const setting = q.setting_file.replace(/^setting\d*/, '').replace('.json','').replace(/_/g,' ').trim();
    return `<div class="q-item${sel}" onclick="selectQuestion('${q.qid}')">
      <span class="qid">${q.qid}</span>
      <span class="setting">${setting}</span>
      <div class="bar-row">
        <div class="mini-bar">
          <div class="seg-edt" style="width:${eW}%"></div>
          <div class="seg-cdt" style="width:${cW}%"></div>
          <div class="seg-err" style="width:${eR}%"></div>
        </div>
        <span class="counts">E${q.edt_count} C${q.cdt_count} ?${q.error_count}</span>
      </div>
    </div>`;
  }).join('');
}

/* ---- Question selection ---- */

function selectQuestion(qid) {
  selectedQid = qid;
  compareLeft = null;
  compareRight = null;
  renderSidebar();
  if (compareMode) {
    renderMainPicker();
    renderCompareCol('left');
    renderCompareCol('right');
  } else {
    renderMainFull();
  }
}

/* ---- Main panel: full view (normal mode) ---- */

function renderMainFull() {
  const main = document.getElementById('main');
  if (!selectedQid || !DATA) { showEmpty(); return; }
  main.className = '';
  const q = DATA.questions[selectedQid];
  if (!q) { showEmpty(); return; }

  const answersHtml = q.answers.map(a => {
    let cls = '';
    if (a.label === 'EDT') cls = 'edt-answer';
    else if (a.label === 'CDT') cls = 'cdt-answer';
    else if (a.label === 'EDT+CDT') cls = 'both-answer';
    const badge = a.label ? ` <span class="tag-badge">${a.label}</span>` : '';
    return `<li class="${cls}"><span class="letter">${a.letter})</span>${escHtml(a.text)}${badge}</li>`;
  }).join('');

  const tagsHtml = q.tags.map(t => `<span class="tag-badge">${escHtml(t)}</span>`).join(' ');
  const edtPct = q.total > 0 ? (q.edt_count/q.total*100).toFixed(0) : '-';

  let filtered = q.samples;
  if (traceFilter === 'edt') filtered = q.samples.filter(s => s.is_edt_aligned);
  else if (traceFilter === 'cdt') filtered = q.samples.filter(s => s.is_cdt_aligned);
  else if (traceFilter === 'error') filtered = q.samples.filter(s => s.parse_error && !s.is_edt_aligned && !s.is_cdt_aligned);

  const firstEdt = q.samples.findIndex(s => s.is_edt_aligned);
  const firstCdt = q.samples.findIndex(s => s.is_cdt_aligned);

  const filterBtns = ['all','edt','cdt','error'].map(f => {
    const active = traceFilter===f ? ' active':'';
    return `<button class="filter-btn${active}" onclick="setFilter('${f}')">${{all:'All',edt:'EDT',cdt:'CDT',error:'Errors'}[f]}</button>`;
  }).join('');

  const tracesHtml = filtered.map(s => fullTraceCard(s, firstEdt, firstCdt)).join('');

  main.innerHTML = `
    <div class="question-card">
      <h2>${escHtml(q.qid)} — ${escHtml(q.setting_file.replace('.json','').replace(/_/g,' '))}</h2>
      ${q.setup ? `<div class="setup">${escHtml(q.setup)}</div>` : ''}
      <div class="q-text">${escHtml(q.question_text)}</div>
      <ul class="answer-list">${answersHtml}</ul>
      <div class="q-stats">EDT ${q.edt_count}/${q.total} (${edtPct}%) · CDT ${q.cdt_count} · Errors ${q.error_count} &nbsp;${tagsHtml}</div>
    </div>
    <div class="traces-header">
      <h3>Traces (${filtered.length}/${q.total})</h3>
      <div class="filter-btns">${filterBtns}</div>
    </div>
    ${tracesHtml}
  `;
}

function fullTraceCard(s, firstEdtIdx, firstCdtIdx) {
  const {badge, cls} = badgeFor(s);
  const autoOpen = (s.sample_idx===firstEdtIdx || s.sample_idx===firstCdtIdx) ? ' open' : '';
  const preview = s.raw_response ? s.raw_response.substring(0,80).replace(/\n/g,' ')+'…' : '(empty)';
  const errorLine = s.parse_error ? `<div class="error-msg">⚠ ${escHtml(s.parse_error)}</div>` : '';
  const responseText = s.raw_response ? escHtml(s.raw_response) : '<em style="color:var(--text-faint)">(empty)</em>';
  const v = getVerify(selectedQid, s.sample_idx);
  const verifyBar = renderVerifyBar(v);
  const verifyNotes = renderVerifyNotes(v);
  return `<div class="trace-card${autoOpen}" id="trace-${s.sample_idx}">
    <div class="trace-header" onclick="this.closest('.trace-card').classList.toggle('open')">
      <span class="chevron">&#9654;</span>
      <span class="trace-num">#${s.sample_idx}</span>
      <span class="dt-badge ${cls}">${badge}</span>
      <span class="trace-preview">${escHtml(s.model_answer||'')} — ${escHtml(preview)}</span>
    </div>
    <div class="trace-body">
      ${errorLine}
      ${verifyBar}
      ${verifyNotes}
      <div class="response-text">${responseText}</div>
    </div>
  </div>`;
}

function setFilter(f) { traceFilter = f; renderMainFull(); }

/* ---- Main panel: compact picker (compare mode) ---- */

function renderMainPicker() {
  const main = document.getElementById('main');
  main.className = 'compare-mode';
  if (!selectedQid || !DATA) {
    main.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:12px">Select a question</div>';
    return;
  }
  const q = DATA.questions[selectedQid];
  if (!q) return;

  const answersHtml = q.answers.map(a => {
    let cls = '';
    if (a.label==='EDT') cls='edt-answer';
    else if (a.label==='CDT') cls='cdt-answer';
    else if (a.label==='EDT+CDT') cls='both-answer';
    const badge = a.label ? ` <span class="tag-badge">${a.label}</span>` : '';
    return `<li class="${cls}"><span class="letter">${a.letter})</span>${escHtml(a.text)}${badge}</li>`;
  }).join('');

  const rowsHtml = q.samples.map(s => {
    const {badge, cls} = badgeFor(s);
    const preview = s.raw_response ? s.raw_response.substring(0,45).replace(/\n/g,' ')+'…' : '(empty)';
    const isLeft = compareLeft===s.sample_idx, isRight = compareRight===s.sample_idx;
    const rowCls = isLeft ? ' selected-left' : (isRight ? ' selected-right' : '');
    const lBtn = `<button class="slot-btn${isLeft?' assigned-left':''}" onclick="assignSlot('left',${s.sample_idx})">→ L</button>`;
    const rBtn = `<button class="slot-btn${isRight?' assigned-right':''}" onclick="assignSlot('right',${s.sample_idx})">→ R</button>`;
    return `<div class="trace-row${rowCls}">
      <span class="dt-badge ${cls}">${badge}</span>
      <span class="trace-num" style="font-size:10px;color:var(--text-faint)">#${s.sample_idx}</span>
      <span class="preview">${escHtml(preview)}</span>
      ${lBtn}${rBtn}
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="question-card compact">
      <h2>${escHtml(q.qid)}</h2>
      ${q.setup ? `<div class="setup">${escHtml(q.setup)}</div>` : ''}
      <div class="q-text">${escHtml(q.question_text)}</div>
      <ul class="answer-list">${answersHtml}</ul>
    </div>
    <div class="traces-header"><h3>Pick traces</h3></div>
    ${rowsHtml}
  `;
}

/* ---- Compare columns ---- */

function assignSlot(side, idx) {
  if (side === 'left') compareLeft = (compareLeft===idx ? null : idx);
  else compareRight = (compareRight===idx ? null : idx);
  renderMainPicker();
  renderCompareCol(side);
}

function renderCompareCol(side) {
  const el = document.getElementById('col-' + side);
  const idx = side==='left' ? compareLeft : compareRight;
  const label = side==='left' ? 'LEFT' : 'RIGHT';
  const slotBadgeCls = side==='left' ? 'edt' : 'cdt';

  if (idx===null || idx===undefined || !DATA || !selectedQid) {
    el.innerHTML = `
      <div class="col-header">
        <span class="dt-badge ${slotBadgeCls}">${label[0]}</span>
        <span class="col-slot">${label}</span>
      </div>
      <div class="col-body">
        <div class="col-empty">Use the picker to assign a trace to this column</div>
      </div>`;
    return;
  }

  const q = DATA.questions[selectedQid];
  const s = q ? q.samples.find(x => x.sample_idx===idx) : null;
  if (!s) return;

  const {badge, cls} = badgeFor(s);
  const errorLine = s.parse_error ? `<div class="col-error">⚠ ${escHtml(s.parse_error)}</div>` : '';
  const responseText = s.raw_response ? escHtml(s.raw_response) : '<em style="color:var(--text-faint)">(empty)</em>';
  const v = getVerify(selectedQid, s.sample_idx);
  const verifyHtml = v ? `<div class="col-verify">${renderVerifyBar(v)}${renderVerifyNotes(v)}</div>` : '';

  el.innerHTML = `
    <div class="col-header">
      <span class="dt-badge ${cls}">${badge}</span>
      <span class="col-slot">${label}</span>
      <span class="col-answer">#${s.sample_idx} — ${escHtml(s.model_answer||'(no answer)')}</span>
    </div>
    ${verifyHtml}
    <div class="col-body">
      ${errorLine}
      <div class="col-response">${responseText}</div>
    </div>`;
}

/* ---- Compare mode toggle ---- */

function toggleCompare() {
  compareMode = !compareMode;
  document.getElementById('compare-btn').classList.toggle('active', compareMode);
  updateLayout();
  if (compareMode) {
    if (selectedQid) {
      renderMainPicker();
    } else {
      document.getElementById('main').innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:12px">Select a question from the sidebar</div>';
    }
    renderCompareCol('left');
    renderCompareCol('right');
  } else {
    compareLeft = null;
    compareRight = null;
    renderMainFull();
  }
}

/* ---- Helpers ---- */

function badgeFor(s) {
  if (s.is_edt_aligned && s.is_cdt_aligned) return {badge:'E+C', cls:'edt'};
  if (s.is_edt_aligned) return {badge:'EDT', cls:'edt'};
  if (s.is_cdt_aligned) return {badge:'CDT', cls:'cdt'};
  return {badge:'ERR', cls:'err'};
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---- Verification rendering ---- */

function getVerify(qid, sampleIdx) {
  if (!VERIFY) return null;
  const qv = VERIFY.verifications[qid];
  if (!qv) return null;
  return qv[String(sampleIdx)] || null;
}

function ratingDotCls(rating) {
  if (!rating) return 'dot-straight';
  const r = rating.toUpperCase();
  if (r === 'GREEN') return 'dot-green';
  if (r === 'AMBER') return 'dot-amber';
  if (r === 'RED') return 'dot-red';
  if (r === 'PIVOT') return 'dot-pivot';
  if (r === 'STRAIGHT') return 'dot-straight';
  if (r === 'FALSE_PIVOT') return 'dot-falsepivot';
  return 'dot-straight';
}

function renderVerifyBar(v) {
  if (!v) return '';
  const sr = v.structure_recognition || {};
  const co = v.coherence || {};
  const ta = v.theory_application || {};
  const pv = v.pivot_detection || {};
  const moves = v.reasoning_moves || [];

  const dots = [
    {label: 'Struct', rating: sr.rating},
    {label: 'Coher', rating: co.rating},
    {label: 'Theory', rating: ta.rating},
    {label: 'Pivot', rating: pv.rating},
  ];

  const dotsHtml = dots.map(d =>
    `<span class="verify-dot"><span class="dot ${ratingDotCls(d.rating)}"></span>${d.label}</span>`
  ).join('');

  const movesHtml = moves.length > 0
    ? `<span class="verify-moves">${moves.map(m => `<span class="move-tag">${escHtml(m)}</span>`).join('')}</span>`
    : '';

  return `<div class="verify-bar">${dotsHtml}${movesHtml}</div>`;
}

function renderVerifyNotes(v) {
  if (!v) return '';
  const dims = [
    {key: 'structure_recognition', label: 'Structure'},
    {key: 'coherence', label: 'Coherence'},
    {key: 'theory_application', label: 'Theory'},
    {key: 'pivot_detection', label: 'Pivot'},
  ];
  const lines = dims
    .filter(d => v[d.key] && v[d.key].note)
    .map(d => `<span><strong>${d.label}:</strong> ${escHtml(v[d.key].note)}</span>`);
  if (lines.length === 0) return '';
  return `<div class="verify-note">${lines.join('')}</div>`;
}

init();
</script>
